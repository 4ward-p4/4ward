// 4ward Simulator
//
// Shared types used by the simulator library and its clients (P4Runtime
// server, STF runner, trace tree tests, BMv2 differential tests).
//
// The Dataplane gRPC service is defined separately in
// grpc/dataplane.proto.

syntax = "proto3";

package fourward;

import "simulator/ir.proto";
import "p4/v1/p4runtime.proto";

option java_package = "fourward";
option java_outer_classname = "SimulatorProto";
option java_multiple_files = true;

// =============================================================================
// Packet types (shared between trace trees and the Dataplane service)
// =============================================================================

message InputPacket {
  uint32 dataplane_ingress_port = 1;
  bytes payload = 2;
  // P4Runtime port ID. Populated by enrichment layers (e.g. DataplaneService),
  // never by the simulator.
  bytes p4rt_ingress_port = 3;

  // Opaque caller-provided tag, copied from InjectPacketRequest.tag.
  int64 tag = 4;
}

message OutputPacket {
  uint32 dataplane_egress_port = 1;
  // P4Runtime port ID. Populated by enrichment layers (e.g. DataplaneService),
  // never by the simulator.
  bytes p4rt_egress_port = 3;
  bytes payload = 2;
  // P4Runtime PacketIn. Populated by enrichment layers for CPU-port outputs;
  // never by the simulator.
  p4.v1.PacketIn packet_in = 4;
}

// =============================================================================
// Execution trace tree
//
// A complete record of every decision the simulator made while processing a
// packet.  Events within a node are ordered chronologically.  At
// branch points the tree forks: each branch represents one possible execution
// path and contains its own subtree of events.
//
// Every node terminates with exactly one outcome — a fork (Replication or
// Choice), a Continuation into another pass, an Output, or a Drop.
// =============================================================================

// Recursive trace structure: a sequence of events followed by an outcome.
// Shared prefix events live in the parent node; per-branch events in subtrees.
message TraceTree {
  repeated TraceEvent events = 1;
  oneof outcome {
    // All branches happen simultaneously; outputs are the union.
    // Cause: clone session or multicast group lookup that triggered the copies.
    Replication replication = 2;

    // Exactly one branch happens at runtime (possible worlds).
    // Cause: the table-apply event for the action selector.
    Choice choice = 3;

    // The same packet continues as another parser-to-deparser pass.
    // Kind: RESUBMIT or RECIRCULATE; KIND_UNSPECIFIED is the proto default
    // but not emitted by any architecture.
    Continuation continuation = 4;

    // Terminal: packet emitted on a port.
    OutputPacket output = 5;

    // Terminal: packet discarded.
    Drop drop = 6;
  }
}

// All branches execute; their output packets are the union.
// Used for any mechanism that sends copies to multiple ports (clone, multicast,
// mirror). `cause` references the lookup event that triggered the copies, if
// any.
message Replication {
  uint64 cause = 1;                 // id of the typed event that triggered this
  repeated TraceTree branches = 2;  // ≥ 1 branch
}

// Exactly one branch executes at runtime.
// Used for action selector groups (the selected member is unknown statically).
// `cause` references the TableLookupEvent for the selector table.
message Choice {
  uint64 cause = 1;                 // id of the typed event that triggered this
  repeated TraceTree branches = 2;  // ≥ 2 branches
}

// The same packet continues as another parser-to-deparser pass.
// Used for resubmit and recirculate.
message Continuation {
  enum Kind {
    KIND_UNSPECIFIED = 0;  // proto3 required default; not emitted by any architecture
    RESUBMIT = 1;
    RECIRCULATE = 2;
  }
  Kind kind = 1;
  TraceTree next = 2;
  // Metadata fields preserved across the loop: field path → formatted value.
  // Only populated for v1model @field_list snapshots; other architectures pass
  // metadata implicitly through the deparser/parser.
  map<string, string> preserved_fields = 3;
}

// A packet that was dropped.  `trigger` is absent when the packet fell off the
// end of the pipeline with no forwarding decision (the implicit default).
// When present, the referenced event's type identifies the cause:
//   MarkToDropEvent                                    → explicit
//   mark_to_drop() call AssertionEvent                                     →
//   assert()/assume() failure MulticastGroupLookupEvent with group_found=false
//   → multicast to empty group
message Drop {
  optional uint64 trigger = 1;  // id of the event that caused the drop, if any
}

message TraceEvent {
  // Trace-global identifier, assigned by the simulator in emission order.
  // Referenced by Replication.cause, Choice.cause, and Drop.trigger to
  // identify which event triggered each outcome.
  uint64 id = 16;

  oneof event {
    // Pipeline lifecycle.
    PacketIngressEvent packet_ingress = 8;
    PipelineStageEvent pipeline_stage = 9;

    // Parser.
    ParserTransitionEvent parser_transition = 1;

    // Control flow.
    TableLookupEvent table_lookup = 2;
    ActionExecutionEvent action_execution = 3;
    BranchEvent branch = 4;
    AssignmentEvent assignment = 14;

    // Externs.
    ExternCallEvent extern_call = 5;
    LogMessageEvent log_message = 11;
    AssertionEvent assertion = 12;

    // Packet replication engine (PRE).
    CloneEvent clone = 7;
    CloneSessionLookupEvent clone_session_lookup = 10;
    MulticastGroupLookupEvent multicast_group_lookup = 15;

    // Packet fate.
    MarkToDropEvent mark_to_drop = 6;

    // Deparser.
    DeparserEmitEvent deparser_emit = 13;
  }

  SourceInfo source_info = 100;

  // Runtime variable values referenced during this event's evaluation.
  // Keys are P4 field paths (e.g. "standard_metadata.egress_rid"), values
  // are the resolved values formatted as decimal integers or hex strings.
  map<string, string> variable_values = 101;

  // Result of the evaluation: boolean for branches/assertions, the
  // assigned value for assignments.
  string result_value = 102;
}

// Fired on every parser state transition, including the final transition to
// "accept" or "reject".
message ParserTransitionEvent {
  string parser_name = 1;
  string from_state = 2;
  string to_state = 3;
  // For select transitions: the evaluated key values (e.g. "0x0800").
  // Empty for direct transitions.
  string select_value = 4;
  // For select transitions: the human-readable key expression
  // (e.g. "hdr.ethernet.etherType"). Empty for direct transitions.
  string select_expression = 5;
}

// Fired on every table.apply(). Records hit/miss, matched entry, and selected
// action.
message TableLookupEvent {
  string table_name = 1;
  // Explicit presence so `hit: false` (miss) is visible in text proto.
  optional bool hit = 2;
  // Matched table entry in dataplane representation. Present on hit; absent on
  // miss.
  p4.v1.TableEntry matched_entry = 3;
  // matched_entry with values translated to P4Runtime representation.
  // Populated by enrichment layers, never by the simulator.
  p4.v1.TableEntry p4rt_matched_entry = 5;
  string action_name = 4;  // default action on miss
}

// Fired when an action begins executing. Parameter values are big-endian bytes.
message ActionExecutionEvent {
  string action_name = 1;
  map<string, bytes> params = 2;
}

// Fired on every if/else branch.
message BranchEvent {
  string control_name = 1;
  // Explicit presence so `taken: false` is visible in text proto output
  // (plain `bool` would be suppressed as a proto3 default value).
  optional bool taken = 2;  // true = then-branch; false = else-branch
}

// Fired on every extern method call.
message ExternCallEvent {
  string extern_instance_name = 1;
  string method = 2;
}

// Fired when mark_to_drop() is called. Records the call site, not the packet
// fate — the actual drop is represented by Drop in PacketOutcome.
message MarkToDropEvent {}

// Fired when the P4 program calls clone().
message CloneEvent {
  uint32 session_id = 1;
}

// Fired at the ingress→egress (or post-egress) boundary when the traffic
// manager resolves a pending clone session.
message CloneSessionLookupEvent {
  uint32 session_id = 1;
  optional bool session_found =
      2;  // false = session not configured, clone silently dropped
  // First replica's destination port; only meaningful when session_found.
  uint32 dataplane_egress_port = 3;
  // P4Runtime port ID. Populated by enrichment layers, never by the simulator.
  bytes p4rt_egress_port = 4;
  // First replica's instance, mapped to egress_rid.
  uint32 egress_rid = 5;
  // Total number of replicas in the clone session. Multi-replica sessions
  // (e.g., mirror-and-punt) produce one clone branch per replica.
  uint32 replica_count = 6;
}

// Fired at the ingress→egress boundary when the traffic manager resolves a
// multicast group. Analogous to CloneSessionLookupEvent.
message MulticastGroupLookupEvent {
  uint32 multicast_group_id = 1;
  optional bool group_found =
      2;  // false = group not configured, multicast silently skipped
  uint32 replica_count =
      3;  // number of replicas in the group; only meaningful when found
}

// Fired when a packet arrives at the pipeline — the very first event in any
// trace.
message PacketIngressEvent {
  uint32 dataplane_ingress_port = 1;
  // P4Runtime port ID. Populated by enrichment layers, never by the simulator.
  bytes p4rt_ingress_port = 2;
}

// Fired when the pipeline enters or exits a processing stage (parser, control,
// deparser).
message PipelineStageEvent {
  string stage_name = 1;
  StageKind stage_kind = 2;
  enum Direction {
    DIRECTION_UNSPECIFIED = 0;
    ENTER = 1;
    EXIT = 2;
  }
  Direction direction = 3;
  // Port the packet is destined for at this stage. Populated on egress
  // ENTER; the simulator sets the dataplane port, enrichment layers add
  // the P4Runtime encoding.
  optional uint32 dataplane_port = 4;
  bytes p4rt_port = 5;
}

// Fired when the P4 program calls log_msg().
message LogMessageEvent {
  string message = 1;
}

// Fired when the P4 program calls assert() or assume(). P4 spec §12.9.
message AssertionEvent {
  bool passed = 1;  // true = condition held; false = assertion failed
}

// Fired when the deparser emits a header to the output packet buffer.
message DeparserEmitEvent {
  string header_type = 1;  // TypeDecl name (e.g. "ethernet_t")
  uint32 byte_length = 2;  // number of bytes emitted for this header
}

// Fired on every assignment statement. The target and assigned value are
// in TraceEvent.variable_values and TraceEvent.result_value.
message AssignmentEvent {
  string target = 1;  // LHS field path (e.g. "standard_metadata.egress_spec")
}
