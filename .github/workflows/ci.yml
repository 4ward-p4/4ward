name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # `closed` triggers cancel-closed-pr-runs; the rest are GitHub's defaults.
    types: [opened, synchronize, reopened, closed]
  schedule:
    # Cache-warming build every 3 days (Mon/Thu 06:00 UTC). BuildBuddy
    # evicted entries within 6 days of inactivity; GHA caches expire
    # after 7. Running every 3 days stays well within both windows.
    - cron: '0 6 * * 1,4'

# Cancel any preceding run on the pull request.
concurrency:
  group: bazel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:

  # When a PR is closed (merged or abandoned), its CI run may still be in
  # progress. GitHub doesn't cancel it automatically — the run keeps going
  # even though its results are now irrelevant. This job fires on the
  # `pull_request: closed` event (added to the `types` list above) and
  # cancels any in-progress runs on the PR's branch, freeing up CI resources
  # and API quota.
  cancel-closed-pr-runs:
    if: github.event.action == 'closed'
    runs-on: ubuntu-24.04
    steps:
      - name: Cancel in-progress runs on closed PR branch
        # List all in-progress workflow runs on the PR's head branch, extract
        # their run IDs (excluding this run), and cancel each one. The
        # `|| true` ensures we don't fail if there's nothing to cancel.
        run: |
          : "${HEAD_BRANCH:?HEAD_BRANCH not set}"
          gh run list \
            --repo "${{ github.repository }}" \
            --branch "$HEAD_BRANCH" \
            --status in_progress \
            --json databaseId \
            --jq '.[].databaseId' \
          | grep -v "^${GITHUB_RUN_ID}$" \
          | xargs -I{} gh run cancel --repo "${{ github.repository }}" {} \
          || true
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}


  docs:
    if: github.event_name == 'push'  # deploy docs only on main pushes
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Build docs
        run: pip install 'mkdocs-material>=9,<10' mkdocs-glightbox && mkdocs build --strict

      - name: Deploy to GitHub Pages
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Clone gh-pages into a standalone repo (avoids worktree issues with
          # actions/checkout's git config).
          git clone --depth=1 --branch=gh-pages \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            /tmp/gh-pages
          # Sync docs output, preserving coverage directories.
          rsync -a --delete --exclude='.git/' --exclude='main/' --exclude='pr/' site/ /tmp/gh-pages/
          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Docs for $SHORT_SHA"
          git push || (git pull --rebase && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    if: github.event.action != 'closed' && github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Check remote cache availability
        id: cache
        uses: ./.github/actions/configure-cache
        with:
          api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Add cache flags to bazelrc
        if: steps.cache.outputs.enabled == 'true'
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          echo "build --config=ci" >> ~/.bazelrc
          echo "common --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}" >> ~/.bazelrc

      # Restore-only: the build-and-test job owns the authoritative cache for
      # this key.  Lint builds a subset of targets, so letting it save would
      # evict simulator/e2e artifacts that build-and-test needs.
      - name: Restore Bazel cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/bazel
          key: bazel-ubuntu-24.04-${{ hashFiles('*.bazel*') }}
          restore-keys: bazel-ubuntu-24.04-

      - name: Clear stale Bazel install
        run: rm -rf ~/.cache/bazel/_bazel_*/install

      - name: Install clang tools
        run: sudo apt install -y clang-format clang-tidy

      # On PRs, skip the C++ linters when no C++ files were modified — most
      # PRs only touch Kotlin or proto files.  Always run on pushes to main.
      - name: Detect C++ changes
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=$(gh pr diff "${{ github.event.pull_request.number }}" --name-only)
          if ! printf '%s\n' "$FILES" | grep -qE '\.(cpp|cc|h)$|\.clang-tidy$'; then
            echo "No C++ files changed; skipping clang-tidy."
            echo "SKIP_CLANG_TIDY=1" >> "$GITHUB_ENV"
          fi
          if ! printf '%s\n' "$FILES" | grep -qE '\.(cpp|cc|h)$|CPPLINT.cfg$'; then
            echo "No C++ files changed; skipping cpplint."
            echo "SKIP_CPPLINT=1" >> "$GITHUB_ENV"
          fi

      - run: ./tools/lint.sh


  build-and-test:
    if: github.event.action != 'closed'
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26]
    env:
      BAZEL_CACHE: ${{ contains(matrix.os, 'macos') && '~/Library/Caches/bazel' || '~/.cache/bazel' }}

    steps:
      - uses: actions/checkout@v6

      - name: Check remote cache availability
        id: cache
        uses: ./.github/actions/configure-cache
        with:
          api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Add cache flags to bazelrc
        if: steps.cache.outputs.enabled == 'true'
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          echo "build --config=ci" >> ~/.bazelrc
          echo "common --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}" >> ~/.bazelrc

      # Select a deterministic Xcode within the current runner image.
      # Doesn't protect against image rotation (different images may
      # have different "newest" versions), but prevents non-determinism
      # from multiple Xcode versions on the same image.
      - name: Select newest Xcode
        if: runner.os == 'macOS'
        run: |
          XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$XCODE" ]]; then
            sudo xcode-select -s "$XCODE"
            echo "Selected $XCODE"
          else
            echo "::warning::No versioned Xcode found; using default $(xcode-select -p)"
          fi

      # On macOS, the output base lives outside BAZEL_CACHE (at
      # /private/var/tmp/_bazel_runner/). Resolve it so the cache step
      # can include it. On Linux the output base is already inside
      # BAZEL_CACHE, so we skip to avoid double-caching.
      - name: Resolve Bazel output base
        if: runner.os == 'macOS'
        id: bazel
        run: |
          OUTPUT_BASE=$(bazel info output_base 2>/dev/null || echo "")
          echo "output_base=$OUTPUT_BASE" >> "$GITHUB_OUTPUT"
          echo "Bazel output base: $OUTPUT_BASE"

      - name: Restore Bazel cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.BAZEL_CACHE }}
            ${{ steps.bazel.outputs.output_base }}
          key: bazel-${{ matrix.os }}-${{ hashFiles('*.bazel*') }}
          restore-keys: |
            bazel-${{ matrix.os }}-
            ${{ matrix.os == 'ubuntu-24.04' && 'bazel-coverage-' || '' }}

      # The cached install base may be stale if Bazel was updated between
      # the cache save and this run. Bazelisk downloads the correct version
      # but can't overwrite a corrupt install directory.
      # The cached install base may be stale (Bazel upgrade), and the
      # cached local_config_cc may reference a different Xcode version's
      # SDK paths (runner image rotation). Clear both so Bazel
      # re-configures from the current environment.
      - name: Clear stale Bazel install and toolchain
        run: |
          rm -rf ${{ env.BAZEL_CACHE }}/_bazel_*/install
          rm -rf ${{ env.BAZEL_CACHE }}/_bazel_*/external/local_config_cc
          OUTPUT_BASE="${{ steps.bazel.outputs.output_base }}"
          if [[ -n "$OUTPUT_BASE" ]]; then
            rm -rf "$OUTPUT_BASE/external/local_config_cc"
          fi

      # BMv2 links against system libgmp and libpcap.
      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libgmp-dev libpcap-dev

      - name: Save start time
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build and test
        run: bazel test //... --test_tag_filters=-heavy

      # Heavy tests (p4testgen) are slow — only run on main pushes where
      # the build cache from the step above is already warm.
      - name: Run heavy tests
        if: github.event_name == 'push' && matrix.os == 'ubuntu-24.04'
        run: bazel test //... --test_tag_filters=heavy

      - name: Log cache diagnostics
        if: always()
        run: |
          echo "### Cache diagnostics (${{ matrix.os }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Bazel cache: $(du -sh ${{ env.BAZEL_CACHE }} 2>/dev/null | cut -f1 || echo N/A)" >> "$GITHUB_STEP_SUMMARY"
          OUTPUT_BASE="${{ steps.bazel.outputs.output_base }}"
          if [[ -n "$OUTPUT_BASE" ]]; then
            echo "Output base: $(du -sh "$OUTPUT_BASE" 2>/dev/null | cut -f1 || echo N/A)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "Xcode: $(xcode-select -p 2>/dev/null || echo N/A)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**[BuildBuddy dashboard](https://4ward.buildbuddy.io/trends/)** — check transfer usage against the 100 GB/month free tier limit." >> "$GITHUB_STEP_SUMMARY"

      - name: Calculate build duration
        if: always()
        run: echo "DURATION=$(( $(date +%s) - START_TIME ))" >> "$GITHUB_ENV"

      # TODO: Re-enable once GitHub download 502s stop. Removing the
      # repository cache saves ~500 MB but forces re-downloads of external
      # deps on the next run, which fails when GitHub returns 502s.
      # - name: Compress cache
      #   if: always()
      #   run: bazel shutdown && rm -rf $(bazel info repository_cache)

      # Save on main pushes or slow PR builds. Skip on schedule —
      # the warm-cache job saves a more complete cache (with all
      # intermediate outputs from a full local build).
      - name: Save Bazel cache
        uses: actions/cache/save@v5
        if: always() && github.event_name != 'schedule' && (github.ref_name == 'main' || env.DURATION > 300)
        with:
          path: |
            ${{ env.BAZEL_CACHE }}
            ${{ steps.bazel.outputs.output_base }}
          key: bazel-${{ matrix.os }}-${{ hashFiles('*.bazel*') }}-${{ github.run_id }}


  # Exercises @fourward via local_path_override from bcr_test_module/, the
  # same way BCR consumers will see it. Catches problems that don't surface
  # when fourward is the root module — dev-dep leaks into public packages,
  # shared @maven namespace conflicts, git_overrides that don't apply to
  # non-root modules, etc. Without this, those bugs first appear in the BCR
  # submission PR, where iteration is slow and shared.
  bcr-consumer-check:
    if: github.event.action != 'closed' && github.event_name != 'schedule'
    name: BCR consumer check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Check remote cache availability
        id: cache
        uses: ./.github/actions/configure-cache
        with:
          api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      # Separate local cache namespace (`bazel-bcr-*`) from the main
      # build-and-test job: this workspace uses a different `.bazelrc`
      # and resolves its own dependency graph via
      # `bcr_test_module/MODULE.bazel`, so sharing a local cache key
      # would cause eviction churn. The remote cache (BuildBuddy) is
      # shared — both builds use the same Bazel version, so action
      # hashes match and the BCR check benefits from warm cache.
      - name: Restore Bazel cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/bazel
          key: bazel-bcr-${{ hashFiles('*.bazel*', 'bcr_test_module/*.bazel*') }}
          restore-keys: bazel-bcr-

      - name: Clear stale Bazel install
        run: rm -rf ~/.cache/bazel/_bazel_*/install

      - name: Save start time
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      # Build flags live in `bcr_test_module/.bazelrc` so local
      # invocations reproduce this job exactly — CI only adds the
      # BuildBuddy remote cache and target-pattern exclusions on top.
      # Keep target patterns in sync with modules/fourward/*/presubmit.yml.
      - name: Build public targets via bcr_test_module
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
          CACHE_ENABLED: ${{ steps.cache.outputs.enabled }}
        run: |
          FLAGS=()
          if [[ "${CACHE_ENABLED}" == "true" ]]; then
            FLAGS+=(
              --remote_cache=grpcs://4ward.buildbuddy.io
              --remote_header=x-buildbuddy-api-key="${BUILDBUDDY_API_KEY}"
              --remote_download_toplevel
              --remote_upload_local_results
              --remote_timeout=30s
              --remote_cache_compression
            )
          fi
          cd bcr_test_module
          bazel build "${FLAGS[@]}" -- \
            @fourward//... \
            -@fourward//e2e_tests/... \
            -@fourward//examples/... \
            -@fourward//tools/...

      - name: Calculate build duration
        if: always()
        run: echo "DURATION=$(( $(date +%s) - START_TIME ))" >> "$GITHUB_ENV"

      # Mirror build-and-test: save on main (authoritative cache) or
      # when the build was slow enough (>5 min) that persisting is
      # worthwhile despite the PR-branch scoping.
      - name: Save Bazel cache
        uses: actions/cache/save@v5
        if: always() && (github.ref_name == 'main' || env.DURATION > 300)
        with:
          path: ~/.cache/bazel
          key: bazel-bcr-${{ hashFiles('*.bazel*', 'bcr_test_module/*.bazel*') }}-${{ github.run_id }}


  # Cache-warming build (runs every 3 days). BuildBuddy DISABLED, forcing a
  # full local build that populates the action cache and disk cache with
  # ALL intermediate outputs. The GHA cache save then captures a complete
  # set of build artifacts — a full local fallback for when BuildBuddy
  # evicts entries during quiet periods.
  #
  # This costs zero BuildBuddy transfer (important on the free tier's
  # 100 GB/month limit) and ~30 minutes of GitHub Actions compute.
  #
  # On schedule events, build-and-test runs in parallel (to warm
  # BuildBuddy) but skips its GHA cache save, so only this job's
  # complete cache is persisted.
  warm-cache:
    if: github.event_name == 'schedule'
    name: Warm cache (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26]
    env:
      BAZEL_CACHE: ${{ contains(matrix.os, 'macos') && '~/Library/Caches/bazel' || '~/.cache/bazel' }}

    steps:
      - uses: actions/checkout@v6

      - name: Select newest Xcode
        if: runner.os == 'macOS'
        run: |
          XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [[ -n "$XCODE" ]]; then
            sudo xcode-select -s "$XCODE"
            echo "Selected $XCODE"
          else
            echo "::warning::No versioned Xcode found; using default $(xcode-select -p)"
          fi

      - name: Resolve Bazel output base
        if: runner.os == 'macOS'
        id: bazel
        run: |
          OUTPUT_BASE=$(bazel info output_base 2>/dev/null || echo "")
          echo "output_base=$OUTPUT_BASE" >> "$GITHUB_OUTPUT"
          echo "Bazel output base: $OUTPUT_BASE"

      - name: Restore Bazel cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.BAZEL_CACHE }}
            ${{ steps.bazel.outputs.output_base }}
          key: bazel-${{ matrix.os }}-${{ hashFiles('*.bazel*') }}
          restore-keys: bazel-${{ matrix.os }}-

      - name: Clear stale Bazel install and toolchain
        run: |
          rm -rf ${{ env.BAZEL_CACHE }}/_bazel_*/install
          rm -rf ${{ env.BAZEL_CACHE }}/_bazel_*/external/local_config_cc
          OUTPUT_BASE="${{ steps.bazel.outputs.output_base }}"
          if [[ -n "$OUTPUT_BASE" ]]; then
            rm -rf "$OUTPUT_BASE/external/local_config_cc"
          fi

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libgmp-dev libpcap-dev

      # Build WITHOUT BuildBuddy — forces all actions to execute locally,
      # populating the disk cache and action cache with intermediate outputs
      # that --remote_download_toplevel normally skips.
      - name: Build (local only)
        run: bazel build //... --disk_cache=${{ env.BAZEL_CACHE }}/disk_cache

      - name: Log cache diagnostics
        if: always()
        run: |
          echo "### Cache diagnostics (${{ matrix.os }}, warm-cache)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Bazel cache: $(du -sh ${{ env.BAZEL_CACHE }} 2>/dev/null | cut -f1 || echo N/A)" >> "$GITHUB_STEP_SUMMARY"
          echo "Disk cache: $(du -sh ${{ env.BAZEL_CACHE }}/disk_cache 2>/dev/null | cut -f1 || echo N/A)" >> "$GITHUB_STEP_SUMMARY"
          OUTPUT_BASE="${{ steps.bazel.outputs.output_base }}"
          if [[ -n "$OUTPUT_BASE" ]]; then
            echo "Output base: $(du -sh "$OUTPUT_BASE" 2>/dev/null | cut -f1 || echo N/A)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # Always save — this is the whole point of the warm-cache job.
      - name: Save Bazel cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ env.BAZEL_CACHE }}
            ${{ steps.bazel.outputs.output_base }}
          key: bazel-${{ matrix.os }}-${{ hashFiles('*.bazel*') }}-${{ github.run_id }}


  coverage:
    # TODO: re-enable for PRs once coverage runs are faster/more reliable.
    if: github.event_name == 'push'
    name: Coverage
    runs-on: ubuntu-24.04
    # Coverage is informational — a slow or flaky run should not block PRs.
    continue-on-error: true
    permissions:
      contents: write
      pull-requests: write
    env:
      PR_NUM: ${{ github.event.pull_request.number || '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Check remote cache availability
        id: cache
        uses: ./.github/actions/configure-cache
        with:
          api-key: ${{ secrets.BUILDBUDDY_API_KEY }}

      - name: Add cache flags to bazelrc
        if: steps.cache.outputs.enabled == 'true'
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          echo "build --config=ci" >> ~/.bazelrc
          echo "common --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}" >> ~/.bazelrc

      - name: Restore Bazel cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/bazel
          key: bazel-coverage-${{ hashFiles('*.bazel*') }}
          restore-keys: |
            bazel-coverage-
            bazel-ubuntu-24.04-

      - name: Clear stale Bazel install
        run: rm -rf ~/.cache/bazel/_bazel_*/install

      - name: Save start time
        run: echo "START_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: sudo apt-get install -y lcov libgmp-dev libpcap-dev

      - name: Fetch gh-pages
        run: git fetch --depth=1 origin gh-pages || true

      - name: Download baseline coverage
        if: github.event_name == 'pull_request'
        run: |
          git show origin/gh-pages:main/coverage.lcov > /tmp/baseline.lcov 2>/dev/null \
            || rm -f /tmp/baseline.lcov

      - name: Generate PR diff
        if: github.event_name == 'pull_request'
        run: gh pr diff "${PR_NUM}" > /tmp/pr.diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run coverage
        run: |
          ARGS=(--html --min-coverage 80)
          if [[ -s /tmp/baseline.lcov && -s /tmp/pr.diff ]]; then
            ARGS+=(--baseline /tmp/baseline.lcov --diff /tmp/pr.diff)
          fi
          ./tools/coverage.sh "${ARGS[@]}"

      - name: Calculate build duration
        if: always()
        run: echo "DURATION=$(( $(date +%s) - START_TIME ))" >> "$GITHUB_ENV"

      # TODO: Re-enable once GitHub download 502s stop (see build-and-test).
      # - name: Compress cache
      #   if: always()
      #   run: bazel shutdown && rm -rf $(bazel info repository_cache)

      # Only save the coverage cache on main pushes. PR coverage runs restore
      # from the main cache but don't save — this prevents PR caches (~625 MB
      # each) from evicting the warm main cache under GitHub's 10 GB limit.
      - name: Save Bazel cache
        uses: actions/cache/save@v5
        if: always() && github.ref_name == 'main'
        with:
          path: ~/.cache/bazel
          key: bazel-coverage-${{ hashFiles('*.bazel*') }}-${{ github.run_id }}

      - name: Publish mainline report
        if: github.event_name == 'push'
        run: |
          git worktree add /tmp/gh-pages gh-pages
          mkdir -p /tmp/gh-pages/main
          cp coverage.lcov /tmp/gh-pages/main/
          cp -r coverage-report/* /tmp/gh-pages/main/
          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add main/
          git commit -m "Coverage report for $(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD)" --allow-empty
          git push origin gh-pages || (git pull --rebase origin gh-pages && git push origin gh-pages)

      - name: Compute diff coverage
        if: github.event_name == 'pull_request'
        run: ./tools/diff-coverage.sh /tmp/pr.diff coverage.lcov >> "$GITHUB_ENV"

      - name: Publish HTML report to GitHub Pages
        if: github.event_name == 'pull_request'
        run: |
          git worktree add /tmp/gh-pages gh-pages
          mkdir -p "/tmp/gh-pages/pr/${PR_NUM}"
          cp -r coverage-report/* "/tmp/gh-pages/pr/${PR_NUM}/"
          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "pr/${PR_NUM}"
          git commit -m "Coverage report for PR #${PR_NUM}" --allow-empty
          # Retry once on conflict (concurrent PR pushes).
          git push origin gh-pages || (git pull --rebase origin gh-pages && git push origin gh-pages)

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        run: |
          MARKER="<!-- coverage-report -->"
          REPO_NAME="${{ github.event.repository.name }}"
          if [[ "${TOTAL_LF}" -gt 0 ]]; then
            PCT=$(( 100 * TOTAL_LH / TOTAL_LF ))
            REPORT_URL="https://${{ github.repository_owner }}.github.io/${REPO_NAME}/pr/${PR_NUM}/"
            BODY="${MARKER}"$'\n'"**Coverage**: ${TOTAL_LH}/${TOTAL_LF} lines (${PCT}%) — [full report](${REPORT_URL})"
          else
            BODY="${MARKER}"$'\n'"**Coverage**: no data collected"
          fi
          if [[ "${DIFF_PCT}" -ge 0 ]]; then
            BODY="${BODY}"$'\n'"**Diff coverage**: ${DIFF_LH}/${DIFF_LF} changed lines (${DIFF_PCT}%)"
          else
            BODY="${BODY}"$'\n'"**Diff coverage**: no coverable lines changed"
          fi
          # Update existing comment or create a new one.
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1)
          if [[ -n "${EXISTING}" ]]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING}" \
              -X PATCH -f body="${BODY}"
          else
            gh pr comment "${PR_NUM}" --body "${BODY}"
          fi
        env:
