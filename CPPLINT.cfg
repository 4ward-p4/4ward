# cpplint configuration. Used in addition to clang-tidy (.clang-tidy) and
# clang-format (Google style). See https://github.com/cpplint/cpplint.
#
# `set noparent` stops cpplint from walking up to find more configs and
# anchors the project root here, so header guards are derived as
# <PATH>_<FILE>_H_ relative to this file.
set noparent

# Permanent exclusions. Keep this list small; each entry is a deliberate
# disagreement with Google style or a known-noisy category.
filter=-whitespace/line_length
# clang-format (Google style, ColumnLimit=80) is the source of truth for
# line length. The few lines that exceed 80 are stream chains clang-format
# refuses to break; second-guessing them by hand is churn.

filter=-readability/braces
# Project policy (documented in .clang-tidy) allows braceless single-line
# if/else in dispatch chains. cpplint's stricter "if one branch has braces,
# all must" rule conflicts with that.

filter=-whitespace/indent_namespace
# False positive on multi-line constructor initializer lists — cpplint
# reads the indented init members as if they were namespace-level decls.

filter=-build/c++17
# `<filesystem>` is a standard C++17 header; the cpplint blocklist is
# stale. The Google style guide explicitly allows it.
